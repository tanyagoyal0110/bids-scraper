# GeM Bid Scraper — Automated Pipeline
# =====================================
# Runs the scraper + filter on a cron schedule,
# then auto-commits updated CSV back to the repo.
# Streamlit Community Cloud auto-redeploys on push.

name: Scrape GeM Bids

on:
  # Run every 12 hours (at midnight and noon UTC)
  schedule:
    - cron: '0 0,12 * * *'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-scraper.txt

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        run: python scraper.py --headless
        env:
          HEADLESS: 'true'

      - name: Run filter
        run: python filter_bids.py

      - name: Check for changes
        id: check
        run: |
          git diff --quiet gem_bids_filtered.csv 2>/dev/null && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push updated CSV
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gem_bids_filtered.csv
          git commit -m "🔄 Auto-update: scraped $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
