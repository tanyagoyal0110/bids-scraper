# GeM Bid Scraper — Auto-Push Updated Data
# ==========================================
# This workflow is triggered when the local scraper pushes
# updated CSV data. It verifies and optionally re-filters.
#
# The SCRAPING itself runs locally (GeM blocks datacenter IPs).
# Use run_scheduled.bat on your PC with Windows Task Scheduler.

name: Process GeM Bids

on:
  # Triggered when data is pushed (from local scraper)
  push:
    paths:
      - 'gem_bids_filtered.csv'

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify CSV
        run: |
          if [ -f gem_bids_filtered.csv ]; then
            LINES=$(wc -l < gem_bids_filtered.csv)
            echo "✅ gem_bids_filtered.csv exists with $LINES lines"
          else
            echo "❌ gem_bids_filtered.csv not found"
            exit 1
          fi

      - name: Summary
        run: |
          echo "### 📊 Data Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          LINES=$(wc -l < gem_bids_filtered.csv)
          echo "- **Total rows:** $((LINES - 1)) bids" >> $GITHUB_STEP_SUMMARY
          echo "- **Updated at:** $(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
